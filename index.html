<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J y P New - Electoledo</title>
    <style>
        :root {
            --gris: #2E2D2D;
            --rojo: #D22B2B;
            --blanco: #ffffff;
            --gris-claro: #f4f4f4;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background-color: var(--blanco); /* Cambiado a blanco para legibilidad */
        }

        /* Encabezado */
        header {
            background-color: var(--gris);
            color: white;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 6px solid var(--rojo);
        }

        nav {
            background-color: var(--gris-claro);
            display: flex;
            justify-content: center;
            padding: 0.8rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            text-decoration: none;
            color: var(--gris);
            font-weight: bold;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--rojo);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        h2, h3 {
            color: var(--gris);
            border-bottom: 2px solid var(--rojo);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Galería */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 2rem 0;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
            text-align: center;
            padding-bottom: 15px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #eee;
        }

        /* Formulario */
        .contact-form {
            background: var(--gris-claro);
            padding: 30px;
            border-radius: 8px;
            border-top: 4px solid var(--gris);
            margin-top: 3rem;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: var(--rojo);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--gris);
        }

        footer {
            background-color: var(--gris);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

    <header id="inicio">
        <h1>Electoledo</h1>
        <p>Nuestra página web oficial</p>
    </header>

    <nav>
        <a href="index.html"">Inicio</a>
        <a href="catalogo.HTML">Catalogo</a>
        <a href="#contacto">Contacto</a>
    </nav>

    <div class="container">
        
        <section id="productos">
            <h2>Nuestros Productos</h2>
            <div class="gallery">
                <div class="card">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFC0bKfnmlp3mjIUpfTrAaJfqMACKGtfETCQ&s" alt="Producto Electoledo">
                    <h3>Unidad Central</h3>
                    <p>Descripción técnica del componente.</p>
                </div>
                </div>
        </section>

        <section id="contacto" class="contact-form">
            <h2>Solicitar Presupuesto</h2>
            <p>Déjanos tus datos y una persona se pondrá en contacto contigo.</p>
            
            <form>
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan Martínez" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="correo@empresa.com" required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Detalles del Proyecto</label>
                    <textarea id="mensaje" rows="5" placeholder="Describe los componentes que necesites"></textarea>
                </div>

                <button type="submit">Enviar Solicitud Técnica</button>
            </form>
        </section>

    </div>

    <footer>
        <p>&copy; 2026 Electrotech - El estándar en electrónica profesional</p>
    </footer>

</body>
</html>
